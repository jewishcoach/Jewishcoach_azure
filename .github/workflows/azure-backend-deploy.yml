# Deploy backend (FastAPI) to Azure Web App
#
# Uses OneDeploy (/api/publish) — deploys code files directly, NO remote pip install.
# Total deploy time: ~1-2 minutes.
#
# Required secrets:
#   AZURE_WEBAPP_PUBLISH_PROFILE  — from Azure Portal → jewishcoach-api → Get publish profile
#
# When requirements.txt changes:
#   The next deploy will take longer (~10 min) because Azure rebuilds the venv.
#   This happens automatically via SCM_DO_BUILD_DURING_DEPLOYMENT on the server.

name: Deploy Backend to Azure Web App

concurrency:
  group: backend-deploy-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/azure-backend-deploy.yml'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: jewishcoach-api
  SCM_URL: https://jewishcoach-api.scm.azurewebsites.net

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Test & Deploy Backend
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies (for tests only)
        run: pip install -r backend/requirements.txt

      - name: Run prompt pipeline tests
        run: |
          python3 test_prompt_manager.py
          python3 test_prompt_pipeline_local.py
          python3 test_prompts_simple.py

      - name: Create deploy zip (code only, no venv)
        run: |
          cd backend
          python3 -c "
          import zipfile, os
          with zipfile.ZipFile('deploy.zip', 'w', zipfile.ZIP_DEFLATED) as z:
              for path in ['app', 'requirements.txt', 'startup.sh', 'gunicorn_conf.py', 'web.config']:
                  if os.path.isdir(path):
                      for r, d, f in os.walk(path):
                          for fn in f:
                              if any(skip in r for skip in ['__pycache__', 'antenv', 'test_venv', '.venv', 'venv']):
                                  continue
                              if fn.endswith('.pyc'):
                                  continue
                              z.write(os.path.join(r, fn))
                  elif os.path.isfile(path):
                      z.write(path)
          "
          echo "deploy.zip size: $(du -sh deploy.zip | cut -f1)"

      - name: Deploy via OneDeploy (fast — no remote pip install)
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          python3 << 'EOF'
          import os, sys, xml.etree.ElementTree as ET, subprocess

          pf = os.environ.get("PUBLISH_PROFILE", "")
          if not pf:
              print("::error::AZURE_WEBAPP_PUBLISH_PROFILE secret is missing")
              sys.exit(1)

          # Parse credentials from publish profile XML
          try:
              root = ET.fromstring(pf)
          except ET.ParseError as e:
              print(f"::error::Invalid publish profile XML: {e}")
              sys.exit(1)

          prof = next(
              (e for e in root.iter() if e.tag.endswith("publishProfile") or e.tag == "publishProfile"),
              list(root)[0] if len(root) > 0 else None
          )
          if prof is None:
              print("::error::No publishProfile element found in XML")
              sys.exit(1)

          user = (prof.get("userName") or "").replace("\\", "").strip()
          pwd  = (prof.get("userPWD") or "").strip()
          if not user or not pwd:
              print("::error::Could not parse userName/userPWD from publish profile")
              sys.exit(1)

          zip_path = "backend/deploy.zip"
          if not os.path.isfile(zip_path):
              print(f"::error::deploy.zip not found at {zip_path}")
              sys.exit(1)

          # OneDeploy — replaces files directly, no Oryx build, ~30s
          url = "https://jewishcoach-api.scm.azurewebsites.net/api/publish?type=zip&restart=true"
          print(f"Deploying to {url} ...")

          result = subprocess.run(
              ["curl", "-s", "-w", "\n%{http_code}",
               "-X", "POST", url,
               "-u", f"{user}:{pwd}",
               "-H", "Content-Type: application/zip",
               "--data-binary", f"@{zip_path}",
               "--max-time", "120"],
              capture_output=True, text=True
          )

          output = result.stdout.strip()
          lines  = output.splitlines()
          http   = lines[-1] if lines else "0"
          body   = "\n".join(lines[:-1])

          if http in ("200", "202", "204"):
              print(f"✅ Deployed successfully (HTTP {http})")
          else:
              print(f"::error::OneDeploy failed with HTTP {http}")
              print(body[:500])
              sys.exit(1)
          EOF
